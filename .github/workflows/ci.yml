name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack & Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint || true
      - run: pnpm build
      - run: pnpm test
