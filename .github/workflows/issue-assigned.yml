name: Issue Assigned

# ==========================================================================
# Posts a comment whenever an issue is assigned to a contributor, welcoming
# them onto that specific task and giving them a pre-flight checklist so
# their eventual PR merges cleanly.
# ==========================================================================

on:
  issues:
    types:
      - assigned

permissions:
  issues: write

jobs:
  notify-assignee:
    name: Notify assigned contributor
    runs-on: ubuntu-latest

    # ------------------------------------------------------------------
    # CONFIG BLOCK — edit these to update socials/links across the message.
    # ------------------------------------------------------------------
    env:
      MAINTAINER_NAME: Ark
      GITHUB_PROFILE_URL: https://github.com/csxark
      LINKEDIN_URL: https://www.linkedin.com/in/csxark
      PORTFOLIO_URL: https://csxark.xyz

    steps:
      - name: Post assignment comment
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const assignee = context.payload.assignee.login;

            const body = [
              "## 🎉 Issue Assigned",
              "",
              `Hi @${assignee}, this issue has been assigned to you. You have 3 days to work on it before it may be unassigned if no progress is made.`,
              "",
              "Thank you for your interest in contributing to the CryptoViz project. We appreciate your willingness to contribute and look forward to your work on this issue.",
              "",
              "### Before you begin",
              "",
              "- Sync your fork with the latest `main` branch",
              "- Pull the latest changes",
              "- Create a new feature branch",
              "- Implement the requested changes",
              "- Test your implementation thoroughly",
              "- Ensure all linting and build checks pass",
              "- Reference this issue in your Pull Request",
              "",
              "Keeping your fork up to date with the latest `main` branch before creating a feature branch helps minimize merge conflicts and streamlines the review process.",
              "",
              "If you have any questions or need clarification while working on the issue, feel free to ask. We look forward to reviewing your contribution.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
