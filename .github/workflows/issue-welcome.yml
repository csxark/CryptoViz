name: Issue Welcome

# ==========================================================================
# Posts a welcome comment whenever a new issue is opened on CryptoViz.
# First-time contributors get an extended welcome + contribution guide.
# Returning contributors get a shorter "welcome back" note.
# Also labels the issue "needs-review" so maintainers can triage it.
# ==========================================================================

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  welcome:
    name: Welcome issue author
    runs-on: ubuntu-latest

    # ------------------------------------------------------------------
    # CONFIG BLOCK — edit these to update socials/links across the message.
    # Nothing below this needs to change when a link or handle changes.
    # ------------------------------------------------------------------
    env:
      MAINTAINER_NAME: Ark
      GITHUB_PROFILE_URL: https://github.com/csxark
      LINKEDIN_URL: https://www.linkedin.com/in/csxark
      PORTFOLIO_URL: https://csxark.xyz

    steps:
      - name: Post welcome comment
        uses: actions/github-script@v9
        env:
          MAINTAINER_NAME: ${{ env.MAINTAINER_NAME }}
          GITHUB_PROFILE_URL: ${{ env.GITHUB_PROFILE_URL }}
          LINKEDIN_URL: ${{ env.LINKEDIN_URL }}
          PORTFOLIO_URL: ${{ env.PORTFOLIO_URL }}
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const association = issue.author_association;

            // GitHub reports either FIRST_TIME_CONTRIBUTOR (first issue/PR to
            // repo) or FIRST_TIMER (first contribution to GitHub at all).
            const isFirstTime =
              association === "FIRST_TIME_CONTRIBUTOR" ||
              association === "FIRST_TIMER";

            // Shared "support us" block used in both message variants.
            const supportSection = [
              "### ❤️ Support CryptoViz",
              "",
              "If you find CryptoViz helpful, consider supporting the project by:",
              "",
              "- ⭐ Starring the repository",
              "- 🍴 Forking the repository",
              `- 👤 Following [${process.env.MAINTAINER_NAME}](${process.env.GITHUB_PROFILE_URL}) on GitHub`,
              `- 💼 Connecting on [LinkedIn](${process.env.LINKEDIN_URL})`,
              `- 🌐 Visiting the [Portfolio](${process.env.PORTFOLIO_URL})`,
              "",
              "Your support helps increase the project's visibility and encourages continued development. Thank you for being a part of the CryptoViz community!",
            ].join("\n");

            let body;

            if (isFirstTime) {
              body = [
                "## 🎉 Welcome to CryptoViz",
                "",
                `Hello @${author},`,
                "",
                "Thank you for opening your first issue in the CryptoViz repository. We appreciate your interest in contributing to the project and are pleased to welcome you to our community.",
                "",
                "Your issue has been received successfully and will be reviewed by the maintainers as soon as possible.",
                "",
                supportSection,
                "",
                "### 📋 Contribution Workflow",
                "",
                "1. ⭐ Star the repository",
                "2. 🍴 Fork the repository",
                "3. ⏳ Wait for a maintainer to assign the issue to you",
                "4. 🔄 Sync your fork with the latest `main` branch",
                "5. 🌿 Create a new feature branch",
                "6. 🛠️ Implement the requested changes",
                "7. ✅ Test your implementation thoroughly",
                "8. 📬 Open a Pull Request and reference this issue",
                "",
                "Following this workflow helps ensure a smooth review process and minimizes merge conflicts.",
                "",
                "We look forward to your contribution. Thank you for choosing to contribute to CryptoViz.",
              ].join("\n");
                } else {
                  body = [
                    "## 💙 Welcome Back",
                    "",
                    `Hello @${author},`,
                    "",
                    "Thank you for opening another issue and for your continued interest in contributing to CryptoViz.",
                    "",
                    "We greatly appreciate your ongoing support and the time you invest in helping improve the project.",
                    "",
                    "Your issue has been received and will be reviewed by the maintainers as soon as possible.",
                    "",
                    supportSection,
                    "",
                    "Thank you for being a valued member of the CryptoViz community. We look forward to collaborating with you again.",
                  ].join("\n");
                }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["needs-review"]
            });
